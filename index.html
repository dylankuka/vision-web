<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISION</title>

    <style>
        body{
            margin:0;
            background:black;
            font-family:Arial,sans-serif;
        }

        nav{
            position:sticky;
            top:0;
            background:#000;
            padding:15px;
            text-align:center;
            z-index:1000;
        }

        nav a{
            color:#40E0D0;
            text-decoration:none;
            margin:0 20px;
            font-size:20px;
            font-weight:bold;
        }

        img{
            width:100%;
            display:block;
        }

        section{
            scroll-margin-top:80px;
        }
    </style>
</head>

<body>

<nav>
    <a href="#inicio">Inicio</a>
    <a href="#encuesta">Encuesta</a>
    <a href="#comparativo">Comparativo</a>
</nav>

<section id="inicio">
    <img src="inicio.png">
</section>

<section id="encuesta">
    <img src="encuesta.png">
</section>

<section id="comparativo">
    <img src="comparativo.png">
</section>

</body>
</html>
